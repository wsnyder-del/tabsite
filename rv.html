<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RV Trip Log · Always an Adventure</title>
<style>
  :root {
    --blue: #185FA5; --blue-light: #E6F1FB; --blue-mid: #378ADD; --blue-dark: #042C53;
    --green: #0F6E56; --green-light: #E1F5EE;
    --amber: #854F0B; --amber-light: #FAEEDA;
    --text: #1a1a1a; --text-muted: #555; --text-hint: #999;
    --border: rgba(0,0,0,0.11); --bg: #fff; --bg-soft: #f7f6f2;
    --radius: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg-soft); color: var(--text); }
  .back-bar { background: #042C53; padding: 10px 1.5rem; }
  .back-link { color: #9FE1CB; font-size: 12px; text-decoration: none; display: inline-flex; align-items: center; gap: 5px; font-weight: 500; }
  .back-link:hover { color: #fff; }
  header { background: linear-gradient(135deg, #042C53 0%, #185FA5 100%); padding: 2rem 1.5rem 1.5rem; position: relative; overflow: hidden; }
  header::before { content: ''; position: absolute; inset: 0; opacity: 0.07; background-image: radial-gradient(circle, #fff 1px, transparent 1px); background-size: 20px 20px; }
  header .inner { position: relative; z-index: 1; max-width: 860px; margin: 0 auto; }
  header h1 { color: #fff; font-size: 26px; font-weight: 700; }
  header p { color: #B5D4F4; font-size: 13px; margin-top: 4px; }
  .stats-bar { display: flex; gap: 12px; margin-top: 1.25rem; flex-wrap: wrap; }
  .stat { background: rgba(255,255,255,0.15); border-radius: 8px; padding: 8px 14px; }
  .stat-num { color: #fff; font-size: 22px; font-weight: 700; }
  .stat-lbl { color: #B5D4F4; font-size: 11px; margin-top: 1px; }
  .container { max-width: 860px; margin: 0 auto; padding: 1.5rem; }
  .tabs { display: flex; gap: 4px; margin-bottom: 1.25rem; background: var(--bg); border-radius: 10px; padding: 4px; border: 0.5px solid var(--border); }
  .tab { flex: 1; padding: 9px 12px; border-radius: 7px; border: none; background: none; cursor: pointer; font-size: 13px; font-weight: 500; color: var(--text-muted); transition: all 0.15s; text-align: center; }
  .tab.active { background: var(--blue); color: #fff; }
  .add-form { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 1.25rem; margin-bottom: 1.25rem; }
  .add-form h3 { font-size: 14px; font-weight: 600; margin-bottom: 12px; color: var(--text-muted); }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .form-full { grid-column: 1/-1; }
  label { font-size: 11px; font-weight: 600; color: var(--text-hint); text-transform: uppercase; letter-spacing: 0.06em; display: block; margin-bottom: 4px; }
  input, textarea, select { width: 100%; padding: 8px 10px; border-radius: 8px; border: 0.5px solid var(--border); background: var(--bg-soft); font-size: 13px; color: var(--text); outline: none; font-family: inherit; }
  input:focus, textarea:focus, select:focus { border-color: var(--blue-mid); background: var(--bg); }
  textarea { resize: vertical; min-height: 70px; }
  .stars-input { display: flex; gap: 4px; }
  .star-btn { background: none; border: none; cursor: pointer; font-size: 22px; opacity: 0.3; transition: opacity 0.1s; padding: 0; }
  .star-btn.on { opacity: 1; }
  .btn-row { display: flex; gap: 8px; margin-top: 12px; }
  .btn-primary { padding: 9px 18px; border-radius: 8px; border: none; background: var(--blue); color: #fff; font-size: 13px; font-weight: 600; cursor: pointer; }
  .btn-primary:hover { background: var(--blue-dark); }
  .btn-secondary { padding: 9px 18px; border-radius: 8px; border: 0.5px solid var(--border); background: none; color: var(--text-muted); font-size: 13px; cursor: pointer; }
  .card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 1.1rem 1.25rem; margin-bottom: 10px; }
  .card-header { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 6px; }
  .card-icon { font-size: 22px; flex-shrink: 0; }
  .card-title { font-size: 15px; font-weight: 600; flex: 1; }
  .card-sub { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
  .card-body { font-size: 13px; color: var(--text-muted); line-height: 1.6; margin-top: 6px; }
  .card-footer { display: flex; align-items: center; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
  .tag { font-size: 11px; padding: 3px 9px; border-radius: 10px; background: var(--bg-soft); border: 0.5px solid var(--border); color: var(--text-hint); }
  .tag.blue { background: var(--blue-light); color: var(--blue); border-color: rgba(24,95,165,0.25); }
  .tag.green { background: var(--green-light); color: var(--green); }
  .tag.amber { background: var(--amber-light); color: var(--amber); }
  .delete-btn { margin-left: auto; background: none; border: none; cursor: pointer; color: var(--text-hint); font-size: 16px; padding: 2px 6px; border-radius: 4px; }
  .delete-btn:hover { color: #c0392b; }
  .empty { text-align: center; padding: 3rem 1rem; color: var(--text-hint); font-size: 14px; }
  .idea-link { color: var(--blue); text-decoration: underline; font-size: 12px; }
  .priority-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 6px; }
  .p-high { background: #e24b4a; } .p-med { background: #EF9F27; } .p-low { background: #639922; }
  @media (max-width: 600px) { .form-grid { grid-template-columns: 1fr; } header h1 { font-size: 20px; } }
</style>
</head>
<body>
<div class="back-bar"><a href="index.html" class="back-link">← Always an Adventure</a></div>
<header>
  <div class="inner">
    <h1>🚐 RV Trip Log</h1>
    <p>Routes, campgrounds, miles, and dream destinations</p>
    <div class="stats-bar">
      <div class="stat"><div class="stat-num" id="trip-count">0</div><div class="stat-lbl">Trips logged</div></div>
      <div class="stat"><div class="stat-num" id="miles-count">0</div><div class="stat-lbl">Total miles</div></div>
      <div class="stat"><div class="stat-num" id="idea-count">0</div><div class="stat-lbl">Routes to explore</div></div>
    </div>
  

    <div style="position:relative;margin-top:1.25rem;border-radius:12px;overflow:hidden;height:200px;background:linear-gradient(135deg, #042C53 0%, #185FA5 100%);">
      <svg style="position:absolute;inset:0;width:100%;height:100%" viewBox="0 0 700 200" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
    <ellipse cx="100" cy="50" rx="55" ry="20" fill="#fff" opacity="0.12"/>
    <ellipse cx="145" cy="42" rx="38" ry="16" fill="#fff" opacity="0.1"/>
    <ellipse cx="540" cy="60" rx="50" ry="18" fill="#fff" opacity="0.1"/>
    <rect x="0" y="160" width="700" height="40" fill="#5F5E5A" opacity="0.3"/>
    <rect x="20" y="175" width="50" height="6" rx="2" fill="#FAC775" opacity="0.3"/>
    <rect x="130" y="175" width="50" height="6" rx="2" fill="#FAC775" opacity="0.3"/>
    <rect x="240" y="175" width="50" height="6" rx="2" fill="#FAC775" opacity="0.3"/>
    <rect x="420" y="175" width="50" height="6" rx="2" fill="#FAC775" opacity="0.3"/>
    <rect x="530" y="175" width="50" height="6" rx="2" fill="#FAC775" opacity="0.3"/>
    <rect x="640" y="175" width="50" height="6" rx="2" fill="#FAC775" opacity="0.3"/>
    <text x="30" y="155" font-size="28" font-family="sans-serif" fill="#fff" opacity="0.15">🚐</text>
    <text x="620" y="155" font-size="22" font-family="sans-serif" fill="#fff" opacity="0.12">🗺</text>
  </svg>
      <img src="Tabitha.png" alt="Tabitha" style="position:absolute;right:0;bottom:0;height:100%;object-fit:contain;object-position:bottom right;z-index:2;">
      <div style="position:absolute;bottom:12px;left:16px;z-index:3;">
        <span style="background:rgba(0,0,0,0.35);color:#fff;font-size:12px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;padding:5px 12px;border-radius:20px;">🚐 rv trip log</span>
      </div>
    </div>
</div>
</header>

<div class="container">
  <div class="tabs">
    <button class="tab active" onclick="switchTab('log')">🗺 Trip Log</button>
    <button class="tab" onclick="switchTab('ideas')">✨ Dream Routes</button>
  </div>

  <div id="tab-log">
    <div class="add-form">
      <h3>+ Log a trip</h3>
      <div class="form-grid">
        <div><label>Trip name / Route</label><input id="t-name" type="text" placeholder="e.g. Upper Peninsula Loop"></div>
        <div><label>Dates</label><input id="t-date" type="text" placeholder="e.g. June 10–17, 2025"></div>
        <div><label>Miles driven</label><input id="t-miles" type="number" placeholder="0"></div>
        <div><label>Nights out</label><input id="t-nights" type="number" placeholder="0"></div>
        <div><label>Campgrounds visited</label><input id="t-camps" type="text" placeholder="e.g. Pictured Rocks, Tahquamenon"></div>
        <div>
          <label>Overall rating</label>
          <div class="stars-input" id="t-stars-wrap">
            <button class="star-btn" onclick="setStar(1)">⭐</button>
            <button class="star-btn" onclick="setStar(2)">⭐</button>
            <button class="star-btn" onclick="setStar(3)">⭐</button>
            <button class="star-btn" onclick="setStar(4)">⭐</button>
            <button class="star-btn" onclick="setStar(5)">⭐</button>
          </div>
        </div>
        <div class="form-full"><label>Highlights / Memories</label><textarea id="t-notes" placeholder="Best moments, wildlife, favorite campgrounds, what to do differently next time..."></textarea></div>
        <div><label>Hook-up type</label>
          <select id="t-hookup">
            <option value="">— select —</option>
            <option>Full hook-up</option><option>Electric only</option><option>Water &amp; electric</option><option>Dry camp</option><option>Mix</option>
          </select>
        </div>
        <div><label>Would repeat?</label>
          <select id="t-return"><option value="">—</option><option>Definitely!</option><option>Maybe</option><option>Probably not</option></select>
        </div>
      </div>
      <div class="btn-row"><button class="btn-primary" onclick="addTrip()">Save trip</button><button class="btn-secondary" onclick="clearTripForm()">Clear</button></div>
    </div>
    <div id="trip-list"></div>
  </div>

  <div id="tab-ideas" style="display:none">
    <div class="add-form">
      <h3>+ Add a dream route</h3>
      <div class="form-grid">
        <div><label>Route / Destination</label><input id="i-name" type="text" placeholder="e.g. Pacific Coast Highway"></div>
        <div><label>States / Region</label><input id="i-state" type="text" placeholder="e.g. CA, OR, WA"></div>
        <div><label>Estimated miles</label><input id="i-miles" type="number" placeholder="0"></div>
        <div><label>Priority</label>
          <select id="i-priority"><option value="high">🔴 Must do!</option><option value="med" selected>🟡 Medium</option><option value="low">🟢 Someday</option></select>
        </div>
        <div><label>Best season</label>
          <select id="i-season"><option value="">Any time</option><option>Spring</option><option>Summer</option><option>Fall</option><option>Winter</option></select>
        </div>
        <div><label>Est. duration</label><input id="i-dur" type="text" placeholder="e.g. 2 weeks"></div>
        <div class="form-full"><label>Why I want to go / Notes</label><textarea id="i-notes" placeholder="Scenic drives, parks along the route, must-stop campgrounds..."></textarea></div>
        <div class="form-full"><label>Link (route planner, Campendium, Harvest Hosts, etc.)</label><input id="i-link" type="url" placeholder="https://..."></div>
      </div>
      <div class="btn-row"><button class="btn-primary" onclick="addIdea()">Save route</button><button class="btn-secondary" onclick="clearIdeaForm()">Clear</button></div>
    </div>
    <div id="idea-list"></div>
  </div>
</div>

<script>
let starVal = 0;
function setStar(n) {
  starVal = n;
  document.querySelectorAll('#t-stars-wrap .star-btn').forEach((b,i) => b.classList.toggle('on', i < n));
}

let data = JSON.parse(localStorage.getItem('rv_data') || '{"trips":[],"ideas":[]}');
function save() { localStorage.setItem('rv_data', JSON.stringify(data)); }

function addTrip() {
  const name = document.getElementById('t-name').value.trim();
  if (!name) { alert('Please enter a trip name.'); return; }
  data.trips.unshift({ id: Date.now(), name,
    date: document.getElementById('t-date').value,
    miles: parseInt(document.getElementById('t-miles').value)||0,
    nights: document.getElementById('t-nights').value,
    camps: document.getElementById('t-camps').value.trim(),
    rating: starVal,
    notes: document.getElementById('t-notes').value.trim(),
    hookup: document.getElementById('t-hookup').value,
    ret: document.getElementById('t-return').value
  });
  save(); clearTripForm(); renderAll();
}

function clearTripForm() {
  ['t-name','t-date','t-miles','t-nights','t-camps','t-notes'].forEach(id => document.getElementById(id).value='');
  document.getElementById('t-hookup').value=''; document.getElementById('t-return').value='';
  starVal=0; document.querySelectorAll('#t-stars-wrap .star-btn').forEach(b=>b.classList.remove('on'));
}

function deleteTrip(id) { if(!confirm('Delete this trip?'))return; data.trips=data.trips.filter(t=>t.id!==id); save(); renderAll(); }

function addIdea() {
  const name = document.getElementById('i-name').value.trim();
  if (!name) { alert('Please enter a route name.'); return; }
  data.ideas.unshift({ id: Date.now(), name,
    state: document.getElementById('i-state').value.trim(),
    miles: document.getElementById('i-miles').value,
    priority: document.getElementById('i-priority').value,
    season: document.getElementById('i-season').value,
    dur: document.getElementById('i-dur').value.trim(),
    notes: document.getElementById('i-notes').value.trim(),
    link: document.getElementById('i-link').value.trim()
  });
  save(); clearIdeaForm(); renderAll();
}

function clearIdeaForm() {
  ['i-name','i-state','i-miles','i-dur','i-notes','i-link'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('i-priority').value='med'; document.getElementById('i-season').value='';
}

function deleteIdea(id) { if(!confirm('Delete this idea?'))return; data.ideas=data.ideas.filter(i=>i.id!==id); save(); renderAll(); }

function stars(n) { return n ? '⭐'.repeat(n) : ''; }

function renderAll() {
  const totalMiles = data.trips.reduce((s,t)=>s+t.miles,0);
  document.getElementById('trip-count').textContent = data.trips.length;
  document.getElementById('miles-count').textContent = totalMiles.toLocaleString();
  document.getElementById('idea-count').textContent = data.ideas.length;

  const tl = document.getElementById('trip-list');
  if (!data.trips.length) { tl.innerHTML='<div class="empty">No trips logged yet — hit the road and log your first!</div>'; }
  else tl.innerHTML = data.trips.map(t=>`
    <div class="card">
      <div class="card-header">
        <div class="card-icon">🚐</div>
        <div style="flex:1">
          <div class="card-title">${t.name}</div>
          <div class="card-sub">${t.date?t.date+' ':''}${t.miles?'· '+t.miles.toLocaleString()+' miles':''} ${t.nights?'· '+t.nights+' nights':''}</div>
        </div>
        <button class="delete-btn" onclick="deleteTrip(${t.id})">✕</button>
      </div>
      ${t.camps?`<div class="card-body">📍 ${t.camps}</div>`:''}
      ${t.notes?`<div class="card-body">${t.notes}</div>`:''}
      <div class="card-footer">
        ${t.rating?`<span class="tag">${stars(t.rating)}</span>`:''}
        ${t.hookup?`<span class="tag blue">${t.hookup}</span>`:''}
        ${t.ret?`<span class="tag ${t.ret==='Definitely!'?'green':''}">${t.ret}</span>`:''}
      </div>
    </div>`).join('');

  const il = document.getElementById('idea-list');
  const pDot={high:'p-high',med:'p-med',low:'p-low'};
  if (!data.ideas.length) { il.innerHTML='<div class="empty">No dream routes yet — where do you want to roll next?</div>'; }
  else il.innerHTML = data.ideas.map(i=>`
    <div class="card">
      <div class="card-header">
        <div class="priority-dot ${pDot[i.priority]||'p-med'}"></div>
        <div style="flex:1">
          <div class="card-title">${i.name}${i.state?' <span style="font-weight:400;color:var(--text-muted)">· '+i.state+'</span>':''}</div>
          <div class="card-sub">${i.dur?i.dur+' ':''} ${i.miles?'· ~'+parseInt(i.miles).toLocaleString()+' mi':''} ${i.season?'· Best in '+i.season:''}</div>
        </div>
        <button class="delete-btn" onclick="deleteIdea(${i.id})">✕</button>
      </div>
      ${i.notes?`<div class="card-body">${i.notes}</div>`:''}
      <div class="card-footer">
        <span class="tag amber">${i.priority==='high'?'🔴 Must do':i.priority==='med'?'🟡 On the list':'🟢 Dream route'}</span>
        ${i.link?`<a href="${i.link}" target="_blank" class="idea-link">🔗 View link</a>`:''}
      </div>
    </div>`).join('');
}

function switchTab(tab) {
  document.getElementById('tab-log').style.display=tab==='log'?'':'none';
  document.getElementById('tab-ideas').style.display=tab==='ideas'?'':'none';
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',(i===0&&tab==='log')||(i===1&&tab==='ideas')));
}

renderAll();
</script>
</body>
</html>
