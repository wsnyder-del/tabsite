<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Camping Journal · Always an Adventure</title>
<style>
  :root {
    --green: #0F6E56; --green-light: #E1F5EE; --green-mid: #1D9E75;
    --amber: #854F0B; --amber-light: #FAEEDA; --amber-mid: #BA7517;
    --text: #1a1a1a; --text-muted: #555; --text-hint: #999;
    --border: rgba(0,0,0,0.11); --bg: #fff; --bg-soft: #f7f6f2;
    --radius: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg-soft); color: var(--text); }

  .back-bar { background: #042C53; padding: 10px 1.5rem; }
  .back-link { color: #9FE1CB; font-size: 12px; text-decoration: none; display: inline-flex; align-items: center; gap: 5px; font-weight: 500; }
  .back-link:hover { color: #fff; }

  header { background: linear-gradient(135deg, #412402 0%, #854F0B 60%, #1D9E75 100%); padding: 2rem 1.5rem 1.5rem; position: relative; overflow: hidden; }
  header::before { content: ''; position: absolute; inset: 0; opacity: 0.07; background-image: radial-gradient(circle, #fff 1px, transparent 1px); background-size: 20px 20px; }
  header .inner { position: relative; z-index: 1; max-width: 860px; margin: 0 auto; }
  header h1 { color: #fff; font-size: 26px; font-weight: 700; }
  header p { color: #FAC775; font-size: 13px; margin-top: 4px; }

  .stats-bar { display: flex; gap: 12px; margin-top: 1.25rem; flex-wrap: wrap; }
  .stat { background: rgba(255,255,255,0.15); border-radius: 8px; padding: 8px 14px; }
  .stat-num { color: #fff; font-size: 22px; font-weight: 700; }
  .stat-lbl { color: #FAC775; font-size: 11px; margin-top: 1px; }

  .container { max-width: 860px; margin: 0 auto; padding: 1.5rem; }

  .tabs { display: flex; gap: 4px; margin-bottom: 1.25rem; background: var(--bg); border-radius: 10px; padding: 4px; border: 0.5px solid var(--border); }
  .tab { flex: 1; padding: 9px 12px; border-radius: 7px; border: none; background: none; cursor: pointer; font-size: 13px; font-weight: 500; color: var(--text-muted); transition: all 0.15s; text-align: center; }
  .tab.active { background: var(--amber-mid); color: #fff; }

  .add-form { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 1.25rem; margin-bottom: 1.25rem; }
  .add-form h3 { font-size: 14px; font-weight: 600; margin-bottom: 12px; color: var(--text-muted); }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .form-grid.three { grid-template-columns: 1fr 1fr 1fr; }
  .form-full { grid-column: 1/-1; }
  label { font-size: 11px; font-weight: 600; color: var(--text-hint); text-transform: uppercase; letter-spacing: 0.06em; display: block; margin-bottom: 4px; }
  input, textarea, select { width: 100%; padding: 8px 10px; border-radius: 8px; border: 0.5px solid var(--border); background: var(--bg-soft); font-size: 13px; color: var(--text); outline: none; font-family: inherit; }
  input:focus, textarea:focus, select:focus { border-color: var(--amber-mid); background: var(--bg); }
  textarea { resize: vertical; min-height: 70px; }
  .stars-input { display: flex; gap: 4px; }
  .star-btn { background: none; border: none; cursor: pointer; font-size: 22px; opacity: 0.3; transition: opacity 0.1s; padding: 0; }
  .star-btn.on { opacity: 1; }
  .btn-row { display: flex; gap: 8px; margin-top: 12px; }
  .btn-primary { padding: 9px 18px; border-radius: 8px; border: none; background: var(--amber-mid); color: #fff; font-size: 13px; font-weight: 600; cursor: pointer; }
  .btn-primary:hover { background: var(--amber); }
  .btn-secondary { padding: 9px 18px; border-radius: 8px; border: 0.5px solid var(--border); background: none; color: var(--text-muted); font-size: 13px; cursor: pointer; }

  .card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 1.1rem 1.25rem; margin-bottom: 10px; position: relative; }
  .card-header { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 6px; }
  .card-icon { font-size: 22px; flex-shrink: 0; margin-top: 1px; }
  .card-title { font-size: 15px; font-weight: 600; flex: 1; }
  .card-sub { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
  .card-body { font-size: 13px; color: var(--text-muted); line-height: 1.6; margin-top: 6px; }
  .card-footer { display: flex; align-items: center; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
  .tag { font-size: 11px; padding: 3px 9px; border-radius: 10px; background: var(--bg-soft); border: 0.5px solid var(--border); color: var(--text-hint); }
  .tag.green { background: var(--green-light); color: var(--green); border-color: rgba(29,158,117,0.25); }
  .tag.amber { background: var(--amber-light); color: var(--amber); border-color: rgba(133,79,11,0.25); }
  .delete-btn { margin-left: auto; background: none; border: none; cursor: pointer; color: var(--text-hint); font-size: 16px; padding: 2px 6px; border-radius: 4px; }
  .delete-btn:hover { color: #c0392b; background: #fde; }
  .empty { text-align: center; padding: 3rem 1rem; color: var(--text-hint); font-size: 14px; }
  .idea-link { color: var(--amber); text-decoration: underline; font-size: 12px; }
  .priority-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 5px; }
  .p-high { background: #e24b4a; }
  .p-med { background: #EF9F27; }
  .p-low { background: #639922; }

  @media (max-width: 600px) {
    .form-grid, .form-grid.three { grid-template-columns: 1fr; }
    header h1 { font-size: 20px; }
  }
</style>
</head>
<body>
<div class="back-bar"><a href="index.html" class="back-link">← Always an Adventure</a></div>
<header>
  <div class="inner">
    <h1>⛺ Camping Journal</h1>
    <p>Trip log, memories, and future adventures</p>
    <div class="stats-bar">
      <div class="stat"><div class="stat-num" id="trip-count">0</div><div class="stat-lbl">Trips logged</div></div>
      <div class="stat"><div class="stat-num" id="idea-count">0</div><div class="stat-lbl">Ideas saved</div></div>
    </div>
  </div>
</header>

<div class="container">
  <div class="tabs">
    <button class="tab active" onclick="switchTab('log')">📖 Trip Log</button>
    <button class="tab" onclick="switchTab('ideas')">✨ Future Ideas</button>
  </div>

  <!-- TRIP LOG TAB -->
  <div id="tab-log">
    <div class="add-form">
      <h3>+ Log a trip</h3>
      <div class="form-grid">
        <div><label>Campsite / Location</label><input id="t-name" type="text" placeholder="e.g. Pictured Rocks, MI"></div>
        <div><label>Date</label><input id="t-date" type="date"></div>
        <div><label>Nights stayed</label><input id="t-nights" type="number" min="1" placeholder="3"></div>
        <div>
          <label>Rating</label>
          <div class="stars-input" id="t-stars-wrap">
            <button class="star-btn" data-v="1" onclick="setStar(1)">⭐</button>
            <button class="star-btn" data-v="2" onclick="setStar(2)">⭐</button>
            <button class="star-btn" data-v="3" onclick="setStar(3)">⭐</button>
            <button class="star-btn" data-v="4" onclick="setStar(4)">⭐</button>
            <button class="star-btn" data-v="5" onclick="setStar(5)">⭐</button>
          </div>
        </div>
        <div class="form-full"><label>Notes / Memories</label><textarea id="t-notes" placeholder="What made this trip special? Highlights, wildlife spotted, favorite spots..."></textarea></div>
        <div><label>Site / Hook-up type</label>
          <select id="t-type">
            <option value="">— select —</option>
            <option>Tent only</option><option>RV – full hook-up</option>
            <option>RV – electric only</option><option>RV – dry camp</option>
            <option>Cabin</option><option>Dispersed / backcountry</option>
          </select>
        </div>
        <div><label>Would return?</label>
          <select id="t-return"><option value="">—</option><option>Definitely!</option><option>Maybe</option><option>Probably not</option></select>
        </div>
      </div>
      <div class="btn-row">
        <button class="btn-primary" onclick="addTrip()">Save trip</button>
        <button class="btn-secondary" onclick="clearTripForm()">Clear</button>
      </div>
    </div>
    <div id="trip-list"></div>
  </div>

  <!-- IDEAS TAB -->
  <div id="tab-ideas" style="display:none">
    <div class="add-form">
      <h3>+ Add a camping idea</h3>
      <div class="form-grid">
        <div><label>Place / Campground</label><input id="i-name" type="text" placeholder="e.g. Boundary Waters, MN"></div>
        <div><label>State / Region</label><input id="i-state" type="text" placeholder="e.g. Minnesota"></div>
        <div><label>Priority</label>
          <select id="i-priority"><option value="high">🔴 High – must do!</option><option value="med" selected>🟡 Medium</option><option value="low">🟢 Someday</option></select>
        </div>
        <div><label>Best season</label>
          <select id="i-season"><option value="">Any time</option><option>Spring</option><option>Summer</option><option>Fall</option><option>Winter</option></select>
        </div>
        <div class="form-full"><label>Notes / Why I want to go</label><textarea id="i-notes" placeholder="What drew you to this spot? Any specific trails, views, or activities?"></textarea></div>
        <div class="form-full"><label>Link (website, AllTrails, Hipcamp, etc.)</label><input id="i-link" type="url" placeholder="https://..."></div>
      </div>
      <div class="btn-row"><button class="btn-primary" onclick="addIdea()">Save idea</button><button class="btn-secondary" onclick="clearIdeaForm()">Clear</button></div>
    </div>
    <div id="idea-list"></div>
  </div>
</div>

<script>
let starVal = 0;
function setStar(n) {
  starVal = n;
  document.querySelectorAll('#t-stars-wrap .star-btn').forEach((b,i) => b.classList.toggle('on', i < n));
}

let data = JSON.parse(localStorage.getItem('camping_data') || '{"trips":[],"ideas":[]}');
function save() { localStorage.setItem('camping_data', JSON.stringify(data)); }

function addTrip() {
  const name = document.getElementById('t-name').value.trim();
  if (!name) { alert('Please enter a campsite name.'); return; }
  data.trips.unshift({
    id: Date.now(), name,
    date: document.getElementById('t-date').value,
    nights: document.getElementById('t-nights').value,
    rating: starVal,
    notes: document.getElementById('t-notes').value.trim(),
    type: document.getElementById('t-type').value,
    ret: document.getElementById('t-return').value
  });
  save(); clearTripForm(); renderAll();
}

function clearTripForm() {
  ['t-name','t-date','t-nights','t-notes'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('t-type').value = '';
  document.getElementById('t-return').value = '';
  starVal = 0;
  document.querySelectorAll('#t-stars-wrap .star-btn').forEach(b => b.classList.remove('on'));
}

function deleteTrip(id) {
  if (!confirm('Delete this trip?')) return;
  data.trips = data.trips.filter(t => t.id !== id);
  save(); renderAll();
}

function addIdea() {
  const name = document.getElementById('i-name').value.trim();
  if (!name) { alert('Please enter a place name.'); return; }
  data.ideas.unshift({
    id: Date.now(), name,
    state: document.getElementById('i-state').value.trim(),
    priority: document.getElementById('i-priority').value,
    season: document.getElementById('i-season').value,
    notes: document.getElementById('i-notes').value.trim(),
    link: document.getElementById('i-link').value.trim()
  });
  save(); clearIdeaForm(); renderAll();
}

function clearIdeaForm() {
  ['i-name','i-state','i-notes','i-link'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('i-priority').value = 'med';
  document.getElementById('i-season').value = '';
}

function deleteIdea(id) {
  if (!confirm('Delete this idea?')) return;
  data.ideas = data.ideas.filter(i => i.id !== id);
  save(); renderAll();
}

function stars(n) { return n ? '⭐'.repeat(n) : '—'; }

function renderAll() {
  document.getElementById('trip-count').textContent = data.trips.length;
  document.getElementById('idea-count').textContent = data.ideas.length;

  const tl = document.getElementById('trip-list');
  if (!data.trips.length) { tl.innerHTML = '<div class="empty">No trips logged yet — add your first one above!</div>'; }
  else tl.innerHTML = data.trips.map(t => `
    <div class="card">
      <div class="card-header">
        <div class="card-icon">⛺</div>
        <div style="flex:1">
          <div class="card-title">${t.name}</div>
          <div class="card-sub">${t.date ? new Date(t.date).toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'}) : ''} ${t.nights ? '· '+t.nights+' night'+(t.nights>1?'s':'') : ''}</div>
        </div>
        <button class="delete-btn" onclick="deleteTrip(${t.id})">✕</button>
      </div>
      ${t.notes ? `<div class="card-body">${t.notes}</div>` : ''}
      <div class="card-footer">
        ${t.rating ? `<span class="tag">${stars(t.rating)}</span>` : ''}
        ${t.type ? `<span class="tag">${t.type}</span>` : ''}
        ${t.ret ? `<span class="tag ${t.ret==='Definitely!'?'green':''}">${t.ret}</span>` : ''}
      </div>
    </div>`).join('');

  const il = document.getElementById('idea-list');
  const pDot = {high:'p-high',med:'p-med',low:'p-low'};
  if (!data.ideas.length) { il.innerHTML = '<div class="empty">No ideas yet — start your wish list above!</div>'; }
  else il.innerHTML = data.ideas.map(i => `
    <div class="card">
      <div class="card-header">
        <div class="priority-dot ${pDot[i.priority]||'p-med'}"></div>
        <div style="flex:1">
          <div class="card-title">${i.name}${i.state?' <span style="font-weight:400;color:var(--text-muted)">· '+i.state+'</span>':''}</div>
          ${i.season ? `<div class="card-sub">Best in ${i.season}</div>` : ''}
        </div>
        <button class="delete-btn" onclick="deleteIdea(${i.id})">✕</button>
      </div>
      ${i.notes ? `<div class="card-body">${i.notes}</div>` : ''}
      <div class="card-footer">
        <span class="tag amber">${i.priority==='high'?'🔴 Must do':i.priority==='med'?'🟡 Someday':'🟢 Dream trip'}</span>
        ${i.link ? `<a href="${i.link}" target="_blank" class="idea-link">🔗 View link</a>` : ''}
      </div>
    </div>`).join('');
}

function switchTab(tab) {
  document.getElementById('tab-log').style.display = tab==='log' ? '' : 'none';
  document.getElementById('tab-ideas').style.display = tab==='ideas' ? '' : 'none';
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', (i===0&&tab==='log')||(i===1&&tab==='ideas')));
}

renderAll();
</script>
</body>
</html>
