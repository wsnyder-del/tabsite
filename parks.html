<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>National Parks Tracker · Always an Adventure</title>
<style>
  :root {
    --green: #0F6E56; --green-light: #E1F5EE; --green-mid: #1D9E75;
    --blue: #185FA5; --blue-light: #E6F1FB;
    --text: #1a1a1a; --text-muted: #666; --text-hint: #999;
    --border: rgba(0,0,0,0.12); --bg: #fff; --bg-secondary: #f7f6f2;
    --radius: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg-secondary); color: var(--text); min-height: 100vh; }

  /* BACK NAV */
  .back-bar {
    background: #042C53; padding: 10px 1.5rem;
  }
  .back-link {
    color: #9FE1CB; font-size: 12px; text-decoration: none;
    display: inline-flex; align-items: center; gap: 5px;
    font-weight: 500; letter-spacing: 0.02em;
  }
  .back-link:hover { color: #fff; }

  header {
    background: linear-gradient(135deg, #0C447C 0%, #0F6E56 100%);
    padding: 2rem 1.5rem 1.5rem;
    position: relative; overflow: hidden;
  }
  header::before {
    content: ''; position: absolute; inset: 0; opacity: 0.08;
    background-image: radial-gradient(circle, #fff 1px, transparent 1px);
    background-size: 20px 20px;
  }
  header .inner { position: relative; z-index: 1; max-width: 860px; margin: 0 auto; }
  header h1 { color: #fff; font-size: 26px; font-weight: 700; letter-spacing: -0.5px; }
  header p { color: #9FE1CB; font-size: 13px; margin-top: 4px; }

  .stats-bar { display: flex; gap: 12px; margin-top: 1.25rem; flex-wrap: wrap; }
  .stat { background: rgba(255,255,255,0.15); border-radius: 8px; padding: 8px 14px; min-width: 120px; }
  .stat-num { color: #fff; font-size: 22px; font-weight: 700; }
  .stat-lbl { color: #9FE1CB; font-size: 11px; margin-top: 1px; }

  .progress-wrap { margin-top: 1rem; }
  .progress-row { display: flex; justify-content: space-between; margin-bottom: 4px; }
  .progress-row span { color: #9FE1CB; font-size: 12px; }
  .progress-track { height: 6px; background: rgba(255,255,255,0.2); border-radius: 3px; }
  .progress-fill { height: 100%; border-radius: 3px; background: #5DCAA5; transition: width 0.3s; }

  .container { max-width: 860px; margin: 0 auto; padding: 1.5rem; }

  .tabs { display: flex; gap: 4px; margin-bottom: 1.25rem; background: var(--bg); border-radius: var(--radius); padding: 4px; border: 0.5px solid var(--border); }
  .tab { flex: 1; padding: 9px 12px; border-radius: 7px; border: none; background: none; cursor: pointer; font-size: 13px; font-weight: 500; color: var(--text-muted); transition: all 0.15s; text-align: center; }
  .tab.active { background: var(--green); color: #fff; }

  .controls { display: flex; gap: 8px; margin-bottom: 1rem; flex-wrap: wrap; }
  .search-wrap { flex: 1; min-width: 180px; position: relative; }
  .search-wrap input { width: 100%; padding: 8px 12px 8px 34px; border-radius: 8px; border: 0.5px solid var(--border); background: var(--bg); font-size: 13px; color: var(--text); outline: none; }
  .search-wrap input:focus { border-color: var(--green-mid); }
  .search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--text-hint); }
  .filter-btn { padding: 8px 14px; border-radius: 8px; border: 0.5px solid var(--border); background: var(--bg); font-size: 12px; cursor: pointer; color: var(--text-muted); font-weight: 500; white-space: nowrap; }
  .filter-btn.active { background: var(--green-light); color: var(--green); border-color: var(--green-mid); }
  .state-filter { padding: 8px 12px; border-radius: 8px; border: 0.5px solid var(--border); background: var(--bg); font-size: 12px; color: var(--text-muted); cursor: pointer; outline: none; }

  .section-header { font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-hint); padding: 1rem 0 6px; border-bottom: 0.5px solid var(--border); margin-bottom: 2px; display: flex; justify-content: space-between; align-items: center; }
  .park-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 8px; cursor: pointer; transition: background 0.1s; border: 0.5px solid transparent; margin-bottom: 2px; }
  .park-item:hover { background: var(--bg-secondary); }
  .park-item.checked { background: var(--green-light); border-color: rgba(29,158,117,0.2); }
  .checkbox { width: 20px; height: 20px; border-radius: 5px; flex-shrink: 0; border: 1.5px solid var(--border); background: var(--bg); display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
  .park-item.checked .checkbox { background: var(--green); border-color: var(--green); }
  .checkmark { color: #fff; font-size: 12px; display: none; }
  .park-item.checked .checkmark { display: block; }
  .park-name { font-size: 14px; color: var(--text); flex: 1; }
  .park-item.checked .park-name { color: var(--green); }
  .park-state { font-size: 11px; color: var(--text-hint); }
  .empty { text-align: center; padding: 3rem 1rem; color: var(--text-hint); font-size: 14px; }
  .reset-btn { font-size: 11px; color: var(--text-hint); background: none; border: none; cursor: pointer; text-decoration: underline; }
  .reset-btn:hover { color: #c0392b; }

  @media (max-width: 600px) {
    header { padding: 1.25rem 1rem; }
    header h1 { font-size: 20px; }
    .container { padding: 1rem; }
  }
</style>
</head>

  ["Prince William Forest Park","VA","Park"],["Rock Creek Park","DC","Park"],
  ["Wolf Trap National Park for the Performing Arts","VA","Park"],
  // Trails
  ["Appalachian","ME-GA","National Scenic Trail"],["Ice Age","WI","National Scenic Trail"],
  ["Natchez Trace","AL/MS/TN","National Scenic Trail"],
  ["Potomac Heritage","DC/MD/PA/VA","National Scenic Trail"],
  // River & Recreation
  ["Big South Fork","TN/KY","National River & Recreation Area"],
  ["New River Gorge","WV","National River"],["River Raisin","MI","National Battlefield Park"],
];

const NP_NAMES = new Set(NP.map(p => p[0]));
// Build full deduplicated list
const seen = new Set();
const npFull = NP.map(p => [p[0], p[1], "National Park"]);
npFull.forEach(p => seen.add(p[0]));
const extraDeduped = EXTRA.filter(p => { if(seen.has(p[0])) return false; seen.add(p[0]); return true; });
const PARKS = [...npFull, ...extraDeduped];

let activeTab = 'np';
let activeFilter = 'all';
let visited = JSON.parse(localStorage.getItem('np_visited') || '{}');

function save() { localStorage.setItem('np_visited', JSON.stringify(visited)); }

function togglePark(name) {
  visited[name] = !visited[name];
  if (!visited[name]) delete visited[name];
  save(); updateStats(); renderList();
}

function updateStats() {
  const npV = NP.filter(p => visited[p[0]]).length;
  const allV = PARKS.filter(p => visited[p[0]]).length;
  document.getElementById('np-count').textContent = npV;
  document.getElementById('nps-count').textContent = allV;
  document.getElementById('np-pct').textContent = Math.round(npV/63*100) + '%';
  document.getElementById('nps-pct').textContent = Math.round(allV/PARKS.length*100) + '%';
  document.getElementById('np-bar').style.width = (npV/63*100) + '%';
  document.getElementById('nps-bar').style.width = (allV/PARKS.length*100) + '%';
}

function switchTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', (i===0&&tab==='np')||(i===1&&tab==='all')));
  renderList();
}

function setFilter(f) {
  activeFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('filter-'+f).classList.add('active');
  renderList();
}

function populateStateFilter() {
  const states = [...new Set(PARKS.map(p => p[1]))].sort();
  const sel = document.getElementById('state-filter');
  states.forEach(s => { const o = document.createElement('option'); o.value=s; o.textContent=s; sel.appendChild(o); });
}

function renderList() {
  const q = document.getElementById('search').value.toLowerCase();
  const sf = document.getElementById('state-filter').value;
  const pool = activeTab === 'np' ? npFull : PARKS;
  let items = pool.filter(p => {
    if (q && !p[0].toLowerCase().includes(q) && !p[1].toLowerCase().includes(q)) return false;
    if (sf && p[1] !== sf) return false;
    if (activeFilter==='visited' && !visited[p[0]]) return false;
    if (activeFilter==='unvisited' && visited[p[0]]) return false;
    return true;
  });

  const container = document.getElementById('list-container');
  if (activeTab === 'np') {
    if (!items.length) { container.innerHTML = '<div class="empty">No parks match your search.</div>'; return; }
    container.innerHTML = `<div class="section-header"><span>National Parks (63)</span><button class="reset-btn" onclick="if(confirm('Clear all visited checkmarks?')){visited={};save();updateStats();renderList();}">Reset all</button></div><div id="the-list"></div>`;
    const list = document.getElementById('the-list');
    items.forEach(p => list.appendChild(makeItem(p)));
  } else {
    container.innerHTML = '';
    if (!items.length) { container.innerHTML = '<div class="empty">No sites match your search.</div>'; return; }
    const groups = {};
    items.forEach(p => { if(!groups[p[2]])groups[p[2]]=[]; groups[p[2]].push(p); });
    Object.keys(groups).sort().forEach(type => {
      const sec = document.createElement('div');
      sec.innerHTML = `<div class="section-header"><span>${type} (${groups[type].length})</span></div>`;
      const list = document.createElement('div');
      groups[type].forEach(p => list.appendChild(makeItem(p)));
      sec.appendChild(list); container.appendChild(sec);
    });
  }
}

function makeItem(p) {
  const isChecked = !!visited[p[0]];
  const div = document.createElement('div');
  div.className = 'park-item' + (isChecked ? ' checked' : '');
  div.onclick = () => togglePark(p[0]);
  div.innerHTML = `<div class="checkbox"><span class="checkmark">✓</span></div><span class="park-name">${p[0]}</span><span class="park-state">${p[1]}</span>`;
  return div;
}

populateStateFilter();
updateStats();
renderList();
</script>
</body>
</html>
